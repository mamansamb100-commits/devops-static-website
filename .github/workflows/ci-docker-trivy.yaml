name: CI Docker Build & Push

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: self-hosted

    #environment: dev

    env:
      IMAGE_NAME: ${{vars.IMAGE_NAME}}
      IMAGE_TAG: ${{vars.IMAGE_TAG}}
      DOCKER_REGISTRY: ${{vars.DOCKER_REGISTRY}}

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      
      - name: Test Varibales
        run: |
          echo "Varibale MYVAR  ${{ vars.MYVAR }} "
          echo "Varibale IMAGE_NAME $IMAGE_NAME "
          echo "Varibale DOCKER_REGISTRY  $DOCKER_REGISTRY "


      - name: Connexion à Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build de l’image Docker
        run: |
          docker build -t $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
        
      - name: Test de l’image Docker
        run: |
          docker image ls $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG 

      - name: Push de l’image Docker
        run: |
          docker push $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: cheikhms/devops-static-website:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          vuln-type: os,library
          ignore-unfixed: true
